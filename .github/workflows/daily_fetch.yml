name: Daily Institutional Data Fetch

on:
  schedule:
    - cron: '30 9 * * 1-5'  # 週一至週五 17:30 台北時間（UTC 09:30）
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas tqdm

      - name: Fetch data
        run: python fetch/daily_fetch.py

      - name: Calculate signals
        run: python process/signal_engine.py

      - name: Fetch margin / short-sale monitor
        run: python fetch/margin_fetch.py

      - name: Margin alert (Telegram, threshold-triggered)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python process/margin_alert.py

      - name: Commit updated database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.db
          git diff --staged --quiet || git commit -m "data: daily update $(date -u +%Y-%m-%d)"
          git push
